<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="archWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a10"/>
      <stop offset="100%" stop-color="#10100a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#archWall)"/>
  <!-- Floor -->
  <rect x="0" y="400" width="960" height="140" fill="#10100a"/>
  <line x1="0" y1="400" x2="960" y2="400" stroke="#2a2a1a" stroke-width="2"/>
  <!-- Archway -->
  <rect x="350" y="60" width="260" height="340" rx="130" fill="#0a0a06" stroke="#3a3a2a" stroke-width="3"/>
  <!-- Shelves -->
  <rect x="60" y="100" width="220" height="300" fill="#1a1a10" stroke="#3a3a2a" stroke-width="2"/>
  <rect x="70" y="120" width="200" height="50" fill="#10100a"/>
  <rect x="70" y="190" width="200" height="50" fill="#10100a"/>
  <rect x="70" y="260" width="200" height="50" fill="#10100a"/>
  <rect x="70" y="330" width="200" height="50" fill="#10100a"/>
  <rect x="680" y="100" width="220" height="300" fill="#1a1a10" stroke="#3a3a2a" stroke-width="2"/>
  <rect x="690" y="120" width="200" height="50" fill="#10100a"/>
  <rect x="690" y="190" width="200" height="50" fill="#10100a"/>
  <rect x="690" y="260" width="200" height="50" fill="#10100a"/>
  <rect x="690" y="330" width="200" height="50" fill="#10100a"/>
  <!-- Scroll / document on pedestal -->
  <rect x="440" y="300" width="80" height="10" fill="#3a3a2a"/>
  <rect x="455" y="260" width="50" height="40" fill="#c9a959" rx="2" opacity="0.7"/>
  <!-- Candle glow -->
  <circle cx="480" cy="240" r="60" fill="#c9a959" opacity="0.05"/>
  <text x="480" y="480" text-anchor="middle" fill="#3a3a2a" font-family="Georgia" font-size="24">The Archive</text>
</svg>
