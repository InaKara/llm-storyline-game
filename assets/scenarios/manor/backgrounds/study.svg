<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f1a"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#wall)"/>
  <!-- Floor -->
  <rect x="0" y="380" width="960" height="160" fill="#1a1410"/>
  <line x1="0" y1="380" x2="960" y2="380" stroke="#3a2f2a" stroke-width="2"/>
  <!-- Window -->
  <rect x="380" y="80" width="200" height="260" rx="100" fill="#0d1a2e" stroke="#5a4a3a" stroke-width="4"/>
  <line x1="480" y1="80" x2="480" y2="340" stroke="#5a4a3a" stroke-width="2"/>
  <line x1="380" y1="210" x2="580" y2="210" stroke="#5a4a3a" stroke-width="2"/>
  <!-- Desk -->
  <rect x="100" y="320" width="280" height="20" rx="4" fill="#3a2510" stroke="#5a4a3a" stroke-width="1"/>
  <rect x="120" y="340" width="10" height="60" fill="#3a2510"/>
  <rect x="350" y="340" width="10" height="60" fill="#3a2510"/>
  <!-- Books on desk -->
  <rect x="140" y="300" width="20" height="20" fill="#8b4513"/>
  <rect x="165" y="305" width="15" height="15" fill="#654321"/>
  <!-- Bookshelf -->
  <rect x="680" y="100" width="200" height="280" fill="#2a1a10" stroke="#5a4a3a" stroke-width="2"/>
  <rect x="690" y="120" width="180" height="40" fill="#1a1410"/>
  <rect x="690" y="180" width="180" height="40" fill="#1a1410"/>
  <rect x="690" y="240" width="180" height="40" fill="#1a1410"/>
  <rect x="690" y="300" width="180" height="40" fill="#1a1410"/>
  <!-- Book spines -->
  <rect x="700" y="125" width="15" height="30" fill="#8b4513"/>
  <rect x="720" y="125" width="12" height="30" fill="#654321"/>
  <rect x="738" y="125" width="18" height="30" fill="#4a2a10"/>
  <rect x="700" y="185" width="14" height="30" fill="#654321"/>
  <rect x="720" y="185" width="16" height="30" fill="#8b4513"/>
  <text x="480" y="490" text-anchor="middle" fill="#5a4a3a" font-family="Georgia" font-size="24">The Study</text>
</svg>
